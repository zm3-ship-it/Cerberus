name: Build Cerberus

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Node (for frontend build)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build backend (ARM64 - GL-MT3000)
        run: |
          cd backend
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-s -w" -o ../dist/cerberus .
          echo "✓ Backend compiled for linux/arm64"

      - name: Build backend (AMD64 - testing/VM)
        run: |
          cd backend
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o ../dist/cerberus-x86 .
          echo "✓ Backend compiled for linux/amd64"

      - name: Package frontend
        run: |
          mkdir -p dist/www
          cp frontend/cerberus-dashboard.jsx dist/www/
          cp frontend/cerberus-api.js dist/www/
          cp frontend/index.html dist/www/
          echo "✓ Frontend packaged"

      - name: Create init script
        run: |
          mkdir -p dist/etc
          cat > dist/etc/cerberus.init << 'EOF'
          #!/bin/sh /etc/rc.common
          START=99
          STOP=10

          start() {
              echo "Starting Cerberus..."
              /usr/bin/cerberus > /var/log/cerberus.log 2>&1 &
          }

          stop() {
              echo "Stopping Cerberus..."
              killall cerberus 2>/dev/null
          }

          restart() {
              stop
              sleep 1
              start
          }
          EOF
          chmod +x dist/etc/cerberus.init
          echo "✓ Init script created"

      - name: Create install script
        run: |
          cat > dist/install.sh << 'SCRIPT'
          #!/bin/bash
          set -e
          ROUTER="${1:-192.168.1.1}"
          USER="root"

          echo ""
          echo "  ██████╗███████╗██████╗ ██████╗ ███████╗██████╗ ██╗   ██╗███████╗"
          echo " ██╔════╝██╔════╝██╔══██╗██╔══██╗██╔════╝██╔══██╗██║   ██║██╔════╝"
          echo " ██║     █████╗  ██████╔╝██████╔╝█████╗  ██████╔╝██║   ██║███████╗"
          echo " ██║     ██╔══╝  ██╔══██╗██╔══██╗██╔══╝  ██╔══██╗██║   ██║╚════██║"
          echo " ╚██████╗███████╗██║  ██║██████╔╝███████╗██║  ██║╚██████╔╝███████║"
          echo "  ╚═════╝╚══════╝╚═╝  ╚═╝╚═════╝ ╚══════╝╚═╝  ╚═╝ ╚═════╝ ╚══════╝"
          echo ""
          echo "Installing to ${USER}@${ROUTER}..."
          echo ""

          # Stop existing
          ssh ${USER}@${ROUTER} "killall cerberus 2>/dev/null || true"

          # Install deps
          echo "[1/5] Installing dependencies..."
          ssh ${USER}@${ROUTER} "opkg update > /dev/null 2>&1; opkg install aircrack-ng tcpdump dsniff nmap hostapd-common dnsmasq kmod-usb3 kmod-mac80211 2>/dev/null; mkdir -p /var/cerberus/captures /www/cerberus"

          # Upload binary
          echo "[2/5] Uploading binary..."
          scp cerberus ${USER}@${ROUTER}:/usr/bin/cerberus
          ssh ${USER}@${ROUTER} "chmod +x /usr/bin/cerberus"

          # Upload frontend
          echo "[3/5] Uploading dashboard..."
          scp -r www/* ${USER}@${ROUTER}:/www/cerberus/

          # Upload init script
          echo "[4/5] Installing service..."
          scp etc/cerberus.init ${USER}@${ROUTER}:/etc/init.d/cerberus
          ssh ${USER}@${ROUTER} "chmod +x /etc/init.d/cerberus && /etc/init.d/cerberus enable"

          # Start
          echo "[5/5] Starting Cerberus..."
          ssh ${USER}@${ROUTER} "/etc/init.d/cerberus restart"
          sleep 2

          if ssh ${USER}@${ROUTER} "pgrep cerberus > /dev/null"; then
            echo ""
            echo "✓ Cerberus is running!"
            echo ""
            echo "  Dashboard: http://${ROUTER}:1471"
            echo "  SSH:       ssh root@${ROUTER}"
            echo ""
          else
            echo "✗ Failed to start. Check: ssh root@${ROUTER} cat /var/log/cerberus.log"
            exit 1
          fi
          SCRIPT
          chmod +x dist/install.sh
          echo "✓ Install script created"

      - name: Package release
        run: |
          cd dist
          tar -czf ../cerberus-release.tar.gz .
          cd ..
          echo "✓ Release packaged: $(du -h cerberus-release.tar.gz | cut -f1)"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: cerberus-build
          path: cerberus-release.tar.gz

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cerberus-release.tar.gz
            dist/cerberus
            dist/cerberus-x86
          body: |
            ## Cerberus ${{ github.ref_name }}
            
            ### Quick Install
            ```bash
            tar -xzf cerberus-release.tar.gz
            ./install.sh 192.168.1.1
            ```
            
            ### What's included
            - `cerberus` — ARM64 binary for GL-MT3000
            - `cerberus-x86` — x86 binary for testing on VMs
            - `www/` — Dashboard frontend
            - `install.sh` — One-command installer
            - `etc/cerberus.init` — OpenWrt init script
