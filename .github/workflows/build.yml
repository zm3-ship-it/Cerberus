name: Build Cerberus

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  OPENWRT_VERSION: "23.05.5"

jobs:
  build-daemon:
    name: Build cerberusd (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # GL.iNet GL-MT3000 (Beryl AX) — MediaTek Filogic 830
          - goarch: arm64
            goarm: ""
            openwrt_arch: aarch64_cortex-a53
            target: mediatek
            subtarget: filogic
          # GL.iNet GL-MT1300 — MediaTek MT7621
          - goarch: mipsle
            goarm: ""
            openwrt_arch: mipsel_24kc
            target: ramips
            subtarget: mt7621
          # Raspberry Pi 4
          - goarch: arm64
            goarm: ""
            openwrt_arch: aarch64_cortex-a72
            target: bcm27xx
            subtarget: bcm2711
          # Generic x86_64 (VMs, PC Engines APU)
          - goarch: amd64
            goarm: ""
            openwrt_arch: x86_64
            target: x86
            subtarget: "64"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install cross-compilers
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu gcc-mipsel-linux-gnu

      - name: Resolve Go dependencies
        run: |
          go get github.com/gopacket/gopacket@latest
          go get github.com/mattn/go-sqlite3@latest
          go mod tidy
          go mod download

      - name: Build cerberusd
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "1"
        run: |
          case "${{ matrix.goarch }}" in
            arm64)  export CC=aarch64-linux-gnu-gcc ;;
            mipsle) export CC=mipsel-linux-gnu-gcc ;;
            amd64)  export CC=gcc ;;
          esac

          go build -ldflags="-s -w -X main.version=$(git describe --tags --always)" \
            -o cerberusd-${{ matrix.openwrt_arch }} \
            ./cmd/cerberusd/

      - uses: actions/upload-artifact@v4
        with:
          name: cerberusd-${{ matrix.openwrt_arch }}
          path: cerberusd-${{ matrix.openwrt_arch }}

  build-frontend:
    name: Build web frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: web
        run: |
          npm install
          npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: web/dist/

  build-firmware:
    name: Build OpenWrt image (${{ matrix.profile }})
    needs: [build-daemon, build-frontend]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - profile: glinet_gl-mt3000
            openwrt_arch: aarch64_cortex-a53
            target: mediatek
            subtarget: filogic
          - profile: generic
            openwrt_arch: x86_64
            target: x86
            subtarget: "64"
    steps:
      - uses: actions/checkout@v4

      - name: Download cerberusd binary
        uses: actions/download-artifact@v4
        with:
          name: cerberusd-${{ matrix.openwrt_arch }}

      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist

      - name: Download OpenWrt Image Builder
        run: |
          IB_URL="https://downloads.openwrt.org/releases/${{ env.OPENWRT_VERSION }}/targets/${{ matrix.target }}/${{ matrix.subtarget }}/openwrt-imagebuilder-${{ env.OPENWRT_VERSION }}-${{ matrix.target }}-${{ matrix.subtarget }}.Linux-x86_64.tar.xz"
          wget -q "$IB_URL"
          tar xf openwrt-imagebuilder-*.tar.xz
          mv openwrt-imagebuilder-*/ imagebuilder/

      - name: Prepare Cerberus files
        run: |
          mkdir -p custom-files/usr/bin
          mkdir -p custom-files/etc/init.d
          mkdir -p custom-files/etc/cerberus
          mkdir -p custom-files/etc/uci-defaults
          mkdir -p custom-files/www/cerberus

          cp cerberusd-${{ matrix.openwrt_arch }} custom-files/usr/bin/cerberusd
          chmod +x custom-files/usr/bin/cerberusd

          cp openwrt/files/etc/init.d/cerberus custom-files/etc/init.d/cerberus
          chmod +x custom-files/etc/init.d/cerberus

          cp openwrt/files/etc/cerberus/cerberus.json custom-files/etc/cerberus/cerberus.json

          cp openwrt/files/etc/uci-defaults/99-cerberus-packages custom-files/etc/uci-defaults/99-cerberus-packages
          chmod +x custom-files/etc/uci-defaults/99-cerberus-packages

          cp -r frontend-dist/* custom-files/www/cerberus/

      - name: Build firmware image
        working-directory: imagebuilder
        run: |
          make image \
            PROFILE="${{ matrix.profile }}" \
            PACKAGES="-dnsmasq luci luci-ssl luci-app-firewall \
              luci-app-opkg luci-app-upnp luci-app-ddns \
              luci-proto-relay luci-proto-wireguard \
              iptables kmod-nf-nat tcpdump \
              aircrack-ng hostapd-common dnsmasq-full \
              kmod-mac80211 wireless-tools iw kmod-cfg80211 \
              ip-full kmod-tun relayd kmod-usb-net-rtl8152 \
              kmod-usb-net kmod-usb-core usbutils \
              nano htop curl wget" \
            FILES="../custom-files" \
            EXTRA_IMAGE_NAME="cerberus"

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.profile }}
          path: imagebuilder/bin/targets/${{ matrix.target }}/${{ matrix.subtarget }}/*cerberus*

  release:
    name: Create release
    needs: [build-firmware]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
