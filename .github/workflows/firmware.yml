name: Build Firmware

on:
  workflow_dispatch:
  push:
    tags: ['fw-*']

jobs:
  build-firmware:
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget libelf-dev

      - name: Cross-compile Cerberus
        run: |
          cd backend
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-s -w" -o ../firmware/output/cerberus .

      - name: Bundle frontend
        run: |
          mkdir -p firmware/output/www
          cp frontend/index.html firmware/output/www/
          cp frontend/cerberus-dashboard.jsx firmware/output/www/
          cp frontend/cerberus-api.js firmware/output/www/
          curl -sL "https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" -o firmware/output/www/react.production.min.js
          curl -sL "https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" -o firmware/output/www/react-dom.production.min.js
          curl -sL "https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js" -o firmware/output/www/babel.min.js

      - name: Clone OpenWrt
        run: |
          cd firmware
          git clone --depth 1 --branch v25.12.0 https://github.com/openwrt/openwrt.git openwrt
          cd openwrt
          sed -i '/telephony/d' feeds.conf.default
          sed -i '/video/d' feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Stage files and configure
        run: |
          cd firmware/openwrt
          
          # Create filesystem overlay
          mkdir -p files/usr/bin files/www/cerberus files/etc/init.d
          mkdir -p files/etc/uci-defaults files/etc/config
          mkdir -p files/etc/cerberus files/var/cerberus/captures
          
          # Binary + frontend
          cp ../output/cerberus files/usr/bin/cerberus
          chmod +x files/usr/bin/cerberus
          cp ../output/www/* files/www/cerberus/
          
          # Init script
          cp ../package/cerberus/files/cerberus.init files/etc/init.d/cerberus
          chmod +x files/etc/init.d/cerberus
          
          # Banner + config
          cp ../files/etc/banner files/etc/banner
          cp ../files/etc/config/system files/etc/config/system
          
          # First-boot
          cat > files/etc/uci-defaults/99-cerberus << 'EOF'
          #!/bin/sh
          echo -e "toor\ntoor" | passwd root
          uci set system.@system[0].hostname='Cerberus'
          uci commit system
          echo 1 > /proc/sys/net/ipv4/ip_forward
          /etc/init.d/cerberus enable 2>/dev/null
          exit 0
          EOF
          chmod +x files/etc/uci-defaults/99-cerberus
          
          # Config
          cat > .config << 'EOF'
          CONFIG_TARGET_mediatek=y
          CONFIG_TARGET_mediatek_filogic=y
          CONFIG_TARGET_MULTI_PROFILE=y
          CONFIG_TARGET_PER_DEVICE_ROOTFS=y
          CONFIG_TARGET_mediatek_filogic_DEVICE_glinet_gl-mt3000=y
          CONFIG_PACKAGE_aircrack-ng=y
          CONFIG_PACKAGE_tcpdump=y
          CONFIG_PACKAGE_nmap=y
          CONFIG_PACKAGE_hostapd=y
          CONFIG_PACKAGE_dnsmasq-full=y
          CONFIG_PACKAGE_kmod-usb-core=y
          CONFIG_PACKAGE_kmod-usb3=y
          CONFIG_PACKAGE_kmod-mac80211=y
          CONFIG_PACKAGE_iwinfo=y
          CONFIG_PACKAGE_ethtool=y
          CONFIG_PACKAGE_openssh-sftp-server=y
          CONFIG_PACKAGE_arp-scan=y
          EOF
          
          make defconfig
          sed -i 's/# CONFIG_TARGET_mediatek_filogic_DEVICE_glinet_gl-mt3000 is not set/CONFIG_TARGET_mediatek_filogic_DEVICE_glinet_gl-mt3000=y/' .config
          make defconfig

      - name: Build firmware
        run: |
          cd firmware/openwrt
          make -j$(nproc) V=s || make -j1 V=s

      - name: Package output
        run: |
          cd firmware/openwrt
          FWFILE=$(find bin/targets/mediatek/filogic/ -name "*gl-mt3000*squashfs-sysupgrade*" | head -1)
          if [ -n "$FWFILE" ]; then
            cp "$FWFILE" ../../cerberus-firmware-gl-mt3000.bin
            echo "✓ Firmware: $(du -h ../../cerberus-firmware-gl-mt3000.bin | cut -f1)"
          else
            echo "No sysupgrade image found"
            ls -la bin/targets/mediatek/filogic/ || true
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cerberus-firmware
          path: cerberus-firmware-gl-mt3000.bin

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/fw-')
        uses: softprops/action-gh-release@v2
        with:
          files: cerberus-firmware-gl-mt3000.bin
          body: |
            ## Cerberus Firmware ${{ github.ref_name }}
            
            Flashable firmware for GL.iNet GL-MT3000. Everything baked in.
            
            **Flash:** `scp cerberus-firmware-gl-mt3000.bin root@192.168.1.1:/tmp/fw.bin && ssh root@192.168.1.1 "sysupgrade -n /tmp/fw.bin"`
            
            **After flash:** SSH `root@192.168.1.1` password `toor` | Dashboard `http://192.168.1.1:1471`
