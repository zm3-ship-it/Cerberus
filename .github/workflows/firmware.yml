name: Build Firmware

on:
  workflow_dispatch:
  push:
    tags: ['fw-*']

jobs:
  build-firmware:
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3-distutils python3-setuptools rsync swig unzip zlib1g-dev \
            file wget libelf-dev

      - name: Cross-compile Cerberus backend
        run: |
          cd backend
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-s -w" -o ../firmware/output/cerberus .
          echo "✓ Backend compiled"

      - name: Bundle frontend
        run: |
          mkdir -p firmware/output/www
          cp frontend/index.html firmware/output/www/
          cp frontend/cerberus-dashboard.jsx firmware/output/www/
          cp frontend/cerberus-api.js firmware/output/www/
          curl -sL "https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" -o firmware/output/www/react.production.min.js
          curl -sL "https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" -o firmware/output/www/react-dom.production.min.js
          curl -sL "https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js" -o firmware/output/www/babel.min.js
          echo "✓ Frontend bundled"

      - name: Clone OpenWrt
        run: |
          cd firmware
          git clone --depth 1 --branch v25.12.0 https://github.com/openwrt/openwrt.git openwrt
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure OpenWrt for GL-MT3000
        run: |
          cd firmware/openwrt
          
          # Install Cerberus package
          mkdir -p package/cerberus/files
          cp ../package/cerberus/Makefile package/cerberus/
          cp ../package/cerberus/files/cerberus.init package/cerberus/files/
          mkdir -p build_dir/cerberus
          cp ../output/cerberus build_dir/cerberus/
          cp -r ../output/www build_dir/cerberus/
          
          # Config
          cat > .config << 'EOF'
          CONFIG_TARGET_mediatek=y
          CONFIG_TARGET_mediatek_filogic=y
          CONFIG_TARGET_mediatek_filogic_DEVICE_glinet_gl-mt3000=y
          CONFIG_PACKAGE_cerberus=y
          CONFIG_PACKAGE_aircrack-ng=y
          CONFIG_PACKAGE_tcpdump=y
          CONFIG_PACKAGE_nmap=y
          CONFIG_PACKAGE_hostapd=y
          CONFIG_PACKAGE_dnsmasq-full=y
          CONFIG_PACKAGE_kmod-usb-core=y
          CONFIG_PACKAGE_kmod-usb3=y
          CONFIG_PACKAGE_kmod-mac80211=y
          CONFIG_PACKAGE_kmod-rtl8812au-ct=y
          CONFIG_PACKAGE_openssh-sftp-server=y
          CONFIG_PACKAGE_iwinfo=y
          CONFIG_PACKAGE_ethtool=y
          EOF
          
          make defconfig

      - name: Build firmware
        run: |
          cd firmware/openwrt
          make -j$(nproc) V=s || make -j1 V=s
          echo "✓ Firmware built"

      - name: Package output
        run: |
          cd firmware/openwrt
          FWFILE=$(find bin/targets/mediatek/filogic/ -name "*gl-mt3000*sysupgrade*" -not -name "*.sha256" | head -1)
          if [ -n "$FWFILE" ]; then
            cp "$FWFILE" ../../cerberus-firmware-gl-mt3000.bin
            echo "✓ Firmware: $(du -h ../../cerberus-firmware-gl-mt3000.bin | cut -f1)"
          else
            echo "Build failed - no sysupgrade image found"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cerberus-firmware
          path: cerberus-firmware-gl-mt3000.bin

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/fw-')
        uses: softprops/action-gh-release@v2
        with:
          files: cerberus-firmware-gl-mt3000.bin
          body: |
            ## Cerberus Firmware ${{ github.ref_name }}
            
            **Flashable firmware for GL.iNet GL-MT3000 (Beryl AX)**
            
            Cerberus + OpenWrt 25.12.0 in one image. All tools pre-installed.
            
            ### Flash via SSH (if already on OpenWrt):
            ```
            scp cerberus-firmware-gl-mt3000.bin root@192.168.1.1:/tmp/
            ssh root@192.168.1.1 "sysupgrade -n /tmp/cerberus-firmware-gl-mt3000.bin"
            ```
            
            ### Flash via U-Boot (from any state):
            1. Hold Reset button while powering on for 10 seconds
            2. Connect ethernet to LAN port
            3. Set your IP to 192.168.1.2
            4. Browse to http://192.168.1.1
            5. Upload this .bin file
            
            Dashboard: `http://192.168.1.1:1471`
